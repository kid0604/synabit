name: Release

# Trigger khi push tag v* (ví dụ: v0.9.0) hoặc chạy manual
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Permission để tạo GitHub Release
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3/M4)
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          # macOS Intel
          - platform: macos-13
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          # Windows
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

          # Linux
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SYNABIT_GOOGLE_CLIENT_ID: ${{ secrets.SYNABIT_GOOGLE_CLIENT_ID }}
          SYNABIT_GOOGLE_CLIENT_SECRET: ${{ secrets.SYNABIT_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Synabit ${{ github.ref_name }}'
          releaseBody: 'See RELEASE_NOTES.md for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
