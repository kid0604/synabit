<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tauri + Vue + Typescript App</title>
  </head>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; background-color: #1a1a1c; color: #fff; font-family: system-ui, sans-serif; }
    #app-loader { display: flex; justify-content: center; align-items: center; height: 100%; flex-direction: column; gap: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #6366f1; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <body>
    <div id="app">
      <div id="app-loader">
        <div class="spinner"></div>
        <div style="font-weight: 600; font-size: 14px; opacity: 0.7; letter-spacing: 1px;">STARTING SYNABIT...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
