name: synabit

services:
  traefik:
    image: traefik:latest
    container_name: synabit-traefik
    environment:
      - DOCKER_API_VERSION=1.46
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.sync.address=:4433/udp"
      # Cấu hình tự động lấy chứng chỉ SSL Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@synabit.net"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "4433:4433/udp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"
    networks:
      - synabit-network
    restart: unless-stopped

  website:
    build: 
      context: ../website
      dockerfile: Dockerfile
    container_name: synabit-website
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.website.rule=Host(`synabit.net`) || Host(`www.synabit.net`)"
      - "traefik.http.routers.website.entrypoints=websecure"
      - "traefik.http.routers.website.tls.certresolver=myresolver"
      # HTTP to HTTPS redirect
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.website-http.rule=Host(`synabit.net`) || Host(`www.synabit.net`)"
      - "traefik.http.routers.website-http.entrypoints=web"
      - "traefik.http.routers.website-http.middlewares=redirect-to-https"
    networks:
      - synabit-network
    restart: unless-stopped

  license-server:
    build:
      context: ../license-server
      dockerfile: Dockerfile
    container_name: synabit-license-server
    volumes:
      - license-data:/app/data
    environment:
      - DATABASE_URL=sqlite:/app/data/license.db
      - LICENSE_PRIVATE_KEY=b304c40591ce072522ff6cc19c5cff1c201880e60ab435ea6fcdb203cba26e85
    env_file:
      - ../license-server/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`license.synabit.net`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
    networks:
      - synabit-network
    restart: unless-stopped

  sync-server:
    build:
      context: ../sync-server
      dockerfile: Dockerfile
    container_name: synabit-sync-server
    volumes:
      - sync-data:/app/data
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.udp.routers.sync.entrypoints=sync"
      # Forward port 4433 UDP into the container
      - "traefik.udp.services.sync.loadbalancer.server.port=4433"
    networks:
      - synabit-network
    restart: unless-stopped

networks:
  synabit-network:
    driver: bridge

volumes:
  sync-data:
    driver: local
  license-data:
    driver: local
  traefik-certs:
    driver: local
